# Local multi-service stack. Mirrors the Render topology: the gateway reaches
# each downstream service by its Compose DNS name over the internal network.
#
#   docker compose up --build
#
# Gateway UI:  http://localhost:3000/api-docs
#
# This stack also runs a single-node Kafka broker (KRaft mode, no ZooKeeper) so
# the event-driven flow is live: order-service publishes `OrderPlaced` to the
# `orders` topic and product-service consumes it to decrement inventory. The
# `orders` topic is auto-created on first use.
services:
  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  # Web UI for inspecting topics/messages/consumer groups — http://localhost:8080
  # Purely an observability tool; no service depends on it.
  kafka-ui:
    image: kafbat/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    environment:
      PORT: 3001
      JWT_SECRET: dev-secret-change-me
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me
      JWT_REFRESH_EXPIRES_IN: 7d
      # Publish UserLoggedIn / UserDetailed to the user-events topic.
      KAFKA_BROKERS: kafka:9092
    ports:
      - "3001:3001"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    environment:
      PORT: 3002
      # Consume OrderPlaced events and decrement inventory.
      KAFKA_BROKERS: kafka:9092
    ports:
      - "3002:3002"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    environment:
      PORT: 3003
      # Publish OrderPlaced events when an order is placed.
      KAFKA_BROKERS: kafka:9092
    ports:
      - "3003:3003"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3003/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    environment:
      PORT: 3004
      # Consume OrderPlaced and open a pending payment for each order.
      KAFKA_BROKERS: kafka:9092
    ports:
      - "3004:3004"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3004/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    environment:
      PORT: 3005
      # Consume user-events (UserLoggedIn / UserDetailed) to send notifications.
      KAFKA_BROKERS: kafka:9092
    ports:
      - "3005:3005"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3005/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    environment:
      PORT: 3006
      # Consume user-events (UserLoggedIn / UserDetailed) into the analytics log.
      KAFKA_BROKERS: kafka:9092
    ports:
      - "3006:3006"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3006/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      PRODUCT_SERVICE_URL: http://product-service:3002
      ORDER_SERVICE_URL: http://order-service:3003
      PAYMENT_SERVICE_URL: http://payment-service:3004
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
      ANALYTICS_SERVICE_URL: http://analytics-service:3006
      PUBLIC_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      auth-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
