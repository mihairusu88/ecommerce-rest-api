# Local multi-service stack. Mirrors the Render topology: the gateway reaches
# each downstream service by its Compose DNS name over the internal network.
#
#   docker compose up --build
#
# Gateway UI:  http://localhost:3000/api-docs
services:
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    environment:
      PORT: 3001
      JWT_SECRET: dev-secret-change-me
      JWT_EXPIRES_IN: 1h
      # MONGODB_URI: mongodb://mongo:27017/auth   # wire up when persistence lands
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      mongo:
        condition: service_started

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    environment:
      PORT: 3002
      # MONGODB_URI: mongodb://mongo:27017/products
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      mongo:
        condition: service_started

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    environment:
      PORT: 3003
      # MONGODB_URI: mongodb://mongo:27017/orders
    ports:
      - "3003:3003"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3003/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      mongo:
        condition: service_started

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      PRODUCT_SERVICE_URL: http://product-service:3002
      ORDER_SERVICE_URL: http://order-service:3003
      PUBLIC_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      auth-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy

  # Anticipates the MongoDB persistence noted in CLAUDE.md. Services don't
  # connect yet, so this is harmless until they do.
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
