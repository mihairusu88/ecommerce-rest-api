# Render Blueprint — provisions all four microservices as Docker web services.
#
# First-time setup (Render dashboard): New + > Blueprint > pick this repo.
# Render reads this file and creates the four services. `sync: false` vars
# (e.g. JWT_SECRET) are prompted for on creation.
#
# autoDeploy is OFF: deploys are triggered by the GitHub Actions workflow
# (.github/workflows/deploy.yml) via each service's Deploy Hook, so CI must pass
# before anything ships. See DEPLOYMENT.md.
#
# The gateway reaches its downstreams over Render's private network. `fromService
# property: hostport` yields `host:port` (no scheme); the gateway prepends
# http:// automatically (config/url.js). PORT is injected by Render — not set here.
services:
  - type: web
    name: auth-service
    runtime: docker
    dockerfilePath: ./services/auth-service/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /api/health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1h

  - type: web
    name: product-service
    runtime: docker
    dockerfilePath: ./services/product-service/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /api/health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: order-service
    runtime: docker
    dockerfilePath: ./services/order-service/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /api/health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: api-gateway
    runtime: docker
    dockerfilePath: ./services/api-gateway/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /api/health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_SERVICE_URL
        fromService:
          name: auth-service
          type: web
          property: hostport
      - key: PRODUCT_SERVICE_URL
        fromService:
          name: product-service
          type: web
          property: hostport
      - key: ORDER_SERVICE_URL
        fromService:
          name: order-service
          type: web
          property: hostport
