# Render Blueprint — provisions all four microservices as Docker web services.
#
# First-time setup (Render dashboard): New + > Blueprint > pick this repo.
# Render reads this file and creates the four services. `sync: false` vars
# (e.g. JWT_SECRET) are prompted for on creation.
#
# autoDeploy is OFF: deploys are triggered by the GitHub Actions workflow
# (.github/workflows/deploy.yml) via each service's Deploy Hook, so CI must pass
# before anything ships. See DEPLOYMENT.md.
#
# The gateway reaches its downstreams over their PUBLIC onrender.com URLs, set
# manually after first deploy (AUTH/PRODUCT/ORDER_SERVICE_URL are sync: false).
# Free web services can't RECEIVE private network traffic, so private addresses
# (fromService property: hostport) are unreachable here — see DEPLOYMENT.md.
# PORT is injected by Render — not set here.
services:
  - type: web
    name: auth-service
    runtime: docker
    dockerfilePath: ./services/auth-service/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /api/health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1h

  - type: web
    name: product-service
    runtime: docker
    dockerfilePath: ./services/product-service/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /api/health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: order-service
    runtime: docker
    dockerfilePath: ./services/order-service/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /api/health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      # No managed Kafka on the free tier — order-service runs in mock mode here
      # (KAFKA_BROKERS unset), so orders are created but no event is published.
      # Point this at a broker (e.g. a managed Kafka) to enable the live flow.

  - type: web
    name: payment-service
    runtime: docker
    dockerfilePath: ./services/payment-service/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /api/health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: notification-service
    runtime: docker
    dockerfilePath: ./services/notification-service/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /api/health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: analytics-service
    runtime: docker
    dockerfilePath: ./services/analytics-service/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /api/health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: api-gateway
    runtime: docker
    dockerfilePath: ./services/api-gateway/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /api/health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      # These are the downstreams' PUBLIC onrender.com URLs.
      #
      # We can NOT use `fromService property: hostport` here: that yields the
      # private-network address, and Render FREE web services cannot RECEIVE
      # private network traffic — the gateway gets `getaddrinfo ENOTFOUND` for
      # those hosts. Public URLs work over the internet and also wake a spun-down
      # free service.
      #
      # CAVEAT: these subdomains are fixed to the CURRENT service instances. If a
      # downstream is deleted & recreated it gets a new `-suffix`, so update the
      # matching URL here (or in the dashboard). Upgrade the downstreams to a paid
      # plan to switch back to `fromService … property: hostport` (private,
      # no spin-down, survives recreation).
      - key: AUTH_SERVICE_URL
        value: https://auth-service-gv8i.onrender.com
      - key: PRODUCT_SERVICE_URL
        value: https://product-service-wupe.onrender.com
      - key: ORDER_SERVICE_URL
        value: https://order-service-vvxp.onrender.com
      # Newer services: set these to the downstreams' PUBLIC onrender.com URLs
      # after their first deploy (same CAVEAT as above — the subdomain is fixed
      # to the current instance). `sync: false` prompts for the value on create;
      # until set, the gateway simply lists these sections as unavailable.
      - key: PAYMENT_SERVICE_URL
        sync: false
      - key: NOTIFICATION_SERVICE_URL
        sync: false
      - key: ANALYTICS_SERVICE_URL
        sync: false
